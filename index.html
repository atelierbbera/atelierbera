<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atelier Bera</title>
    <style>
        body { font-family: 'Georgia', serif; margin: 0; background-color: #fdfaf6; color: #333; }
        .top-bar { background-color: #800020; color: white; text-align: center; padding: 10px 0; font-size: 0.85rem; }
        .header-wrapper { display: flex; justify-content: space-between; padding: 20px; align-items: center; border-bottom: 1px solid #eee; }
        .menu-btn { cursor: pointer; font-size: 28px; color: #800020; }
        
        .side-nav { height: 100%; width: 0; position: fixed; top: 0; left: 0; background-color: #fdfaf6; transition: 0.3s; padding-top: 80px; z-index: 1000; border-right: 1px solid #ddd; overflow-x: hidden; }
        .side-nav a { padding: 15px 25px; display: block; color: #333; text-decoration: none; cursor: pointer; font-weight: bold; }
        .sub-menu { display: none; padding-left: 20px; font-weight: normal; font-size: 0.9rem; }
        
        #main-content { padding: 40px 20px; text-align: center; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 800px; margin: auto; }
        .product-card { border: 1px solid #eee; padding: 8px; text-align: center; cursor: pointer; background: white; border-radius: 6px; }
        .product-card img { width: 100%; height: 120px; object-fit: contain; border-radius: 4px; }
        .btn-add { background: #800020; color: white; border: none; padding: 8px; width: 100%; cursor: pointer; border-radius: 4px; }
        
        /* Sepet Stilleri */
        .cart-item { display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; padding: 15px; max-width: 600px; margin: auto; }
        .cart-item img { width: 60px; height: 60px; object-fit: cover; }
        .cart-summary { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
        
        #toast { visibility: hidden; background: #333; color: #fff; text-align: center; padding: 12px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; transform: translateX(-50%); border-radius: 5px; }
        #toast.show { visibility: visible; }
    </style>
</head>
<body>

    <div id="toast">Sepetinize eklendi!</div>
    <div class="top-bar">1500 TL üzeri alışverişlerde kargo ücretsiz!</div>
    <div class="header-wrapper">
        <div class="menu-btn" onclick="toggleNav()">☰</div>
        <div onclick="showCart()" style="cursor:pointer; font-weight:bold;">Sepet (<span id="cart-count">0</span>)</div>
    </div>

    <div id="sideNav" class="side-nav">
        <a onclick="showHome()">Ana Sayfa</a>
        <a onclick="toggleSub('menu1')">1- Bardak ve Kavanoz Mumlar</a>
        <div id="menu1" class="sub-menu">
            <a onclick="showProducts('recel')">Reçel Serisi</a>
            <a onclick="showProducts('aromaterapi')">Aromaterapi Serisi</a>
        </div>
        <a onclick="showProducts('teneke')">2- Teneke Kutu Mumlar</a>
        <a onclick="showProducts('dekoratif')">3- Dekoratif Mumlar</a>
    </div>

    <div id="main-content">
        <h1>ATELIER BERA</h1>
        <p>handmade candles</p>
    </div>

<script>
    const products = {
        'recel': [
            {id: 1, name: "Strawberry Jam", price: 650, img: "Strawberry Jam.jfif"},
            {id: 2, name: "Blueberry Jam", price: 650, img: "Blueberry Jam.jfif"},
            {id: 3, name: "Lemon Jam", price: 650, img: "Lemon Jam.jfif"},
            {id: 4, name: "Mandarin Jam", price: 650, img: "Mandarin Jam.jfif"},
            {id: 5, name: "Raspberry Jam", price: 650, img: "Raspberry Jam.jfif"}
        ]
    };

    let cart = [];

    function toggleNav() { document.getElementById("sideNav").style.width = "280px"; }
    function toggleSub(id) { let el = document.getElementById(id); el.style.display = (el.style.display === "block") ? "none" : "block"; }

    function showHome() {
        document.getElementById('main-content').innerHTML = `<h1>ATELIER BERA</h1><p>handmade candles</p>`;
        document.getElementById("sideNav").style.width = "0";
    }

    function showProducts(cat) {
        const main = document.getElementById('main-content');
        if (!products[cat]) { main.innerHTML = `<h2>Çok yakında sizlerle...</h2>`; }
        else {
            main.innerHTML = `<div class="product-grid" id="grid"></div>`;
            products[cat].forEach(p => {
                document.getElementById('grid').innerHTML += `
                <div class="product-card" onclick="showDetail(${p.id}, '${cat}')">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <p>${p.price} TL</p>
                    <button class="btn-add" onclick="addToCart(event, ${p.id}, '${cat}')">Sepete Ekle</button>
                </div>`;
            });
        }
        document.getElementById("sideNav").style.width = "0";
    }

    function addToCart(event, id, cat) {
        event.stopPropagation();
        const product = products[cat].find(p => p.id === id);
        const existing = cart.find(item => item.id === id);
        if (existing) existing.qty += 1;
        else cart.push({...product, qty: 1});
        
        document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
        const x = document.getElementById("toast");
        x.className = "show";
        setTimeout(() => x.className = x.className.replace("show", ""), 2000);
    }

    function showCart() {
        let html = `<h2>Sepetiniz</h2>`;
        let total = 0;
        cart.forEach(item => {
            total += item.price * item.qty;
            html += `
            <div class="cart-item">
                <img src="${item.img}">
                <span>${item.name} (x${item.qty})</span>
                <span>${item.price * item.qty} TL</span>
            </div>`;
        });
        html += `
            <div class="cart-summary">
                <p>Toplam: ${total} TL</p>
                <button class="btn-add" onclick="alert('Ödeme sayfasına yönlendiriliyorsunuz...')">Alışverişi Tamamla</button>
            </div>`;
        document.getElementById('main-content').innerHTML = html;
        document.getElementById("sideNav").style.width = "0";
    }

    function showDetail(id, cat) {
        const p = products[cat].find(x => x.id === id);
        document.getElementById('main-content').innerHTML = `
            <div style="text-align:center; max-width:400px; margin:auto;">
                <img src="${p.img}" style="width:100%; border-radius:10px;">
                <h1>${p.name}</h1>
                <p>${p.price} TL</p>
                <button class="btn-add" onclick="addToCart(event, ${p.id}, '${cat}')">Sepete Ekle</button>
                <br><br><a href="#" onclick="showProducts('${cat}')">Geri Dön</a>
            </div>`;
    }
</script>
</body>
</html>
