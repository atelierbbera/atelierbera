<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atelier Bera</title>
    <style>
        body { font-family: 'Georgia', serif; margin: 0; background-color: #fdfaf6; color: #333; }
        
        /* Kırmızı Şerit ve İkonlar */
        .top-bar { background-color: #800020; color: white; text-align: center; padding: 10px 0; font-size: 0.9rem; }
        .header-wrapper { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; }
        .menu-btn, .cart-btn { cursor: pointer; font-size: 24px; color: #800020; }

        /* Sol Menü Paneli */
        .side-nav { height: 100%; width: 0; position: fixed; top: 0; left: 0; background-color: #fdfaf6; 
                    overflow-x: hidden; transition: 0.3s; padding-top: 80px; z-index: 1000; border-right: 1px solid #ddd; }
        .side-nav a { padding: 15px 25px; display: block; color: #333; text-decoration: none; cursor: pointer; }
        .sub-menu { display: none; padding-left: 20px; font-size: 0.9rem; }

        /* Hero Yazısı */
        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h1 { color: #800020; font-size: 4rem; margin: 0; }
        .subtitle { font-style: italic; color: #333; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div class="top-bar">1500 TL üzeri alışverişlerinizde kargo ücretsiz!</div>
    
    <div class="header-wrapper">
        <div class="menu-btn" onclick="toggleNav()">☰</div>
        <div class="cart-btn">Sepet (<span id="cart-count">0</span>)</div>
    </div>

    <div id="sideNav" class="side-nav">
        <a onclick="toggleSub('bardak-sub')">1- Bardak ve Kavanoz Mumlar</a>
        <div id="bardak-sub" class="sub-menu">
            <a onclick="alert('Bardak Mumlar')">Bardak Mumlar</a>
            <a onclick="toggleSub('kavanoz-sub')">Kavanoz Mumlar</a>
            <div id="kavanoz-sub" class="sub-menu">
                <a onclick="alert('Reçel Serisi')">Reçel Serisi</a>
                <a onclick="alert('Aromaterapi Serisi')">Aromaterapi Serisi</a>
            </div>
        </div>
        <a onclick="alert('Teneke')">2- Teneke Kutu Mumlar</a>
        <a onclick="alert('Motif')">3- Motif Mumlar</a>
    </div>

    <div class="hero" onclick="closeNav()">
        <h1>ATELIER BERA</h1>
        <p class="subtitle">handmade candles</p>
    </div>

    <script>
        function toggleNav() {
            let nav = document.getElementById("sideNav");
            nav.style.width = (nav.style.width === "280px") ? "0" : "280px";
        }
        function closeNav() { document.getElementById("sideNav").style.width = "0"; }
        function toggleSub(id) {
            let el = document.getElementById(id);
            el.style.display = (el.style.display === "block") ? "none" : "block";
        }
    </script>
</body>
</html>
