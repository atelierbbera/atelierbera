<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">1500₺ Üzeri Ücretsiz Kargo</div>
    
    <header class="main-header">
        <div class="header-top">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <div class="cart-icon">🛒 Sepet (0)</div>
        </div>
        <div class="logo-area">
            <h1>ATELİER BERA</h1>
            <p>Handmade Candles</p>
        </div>
    </header>

    <nav id="side-menu" class="side-menu">
        <ul>
            <li><a href="#">Bardak Ve Kavanoz Mumlar</a></li>
            <li><a href="#">Teneke Mumlar</a></li>
            <li><a href="#">Motif Mumlar</a></li>
            <li><a href="#">Hakkımızda</a></li>
            <li><a href="#">İletişim</a></li>
        </ul>
    </nav>

    <main class="content">
        </main>
<main class="content">
    <!-- Reçel Serisi -->
    <h2>Reçel Serisi</h2>
    <div class="product-grid">
        <div class="product-card">
            <div class="placeholder-img">📷</div>
            <h3>Strawberry Jam</h3>
            <p>650₺</p>
            <button onclick="addToCart('Strawberry')">Sepete Ekle</button>
        </div>
        <div class="product-card">
            <div class="placeholder-img">📷</div>
            <h3>Mandarin Jam</h3>
            <p>650₺</p>
            <button onclick="addToCart('Mandarin')">Sepete Ekle</button>
        </div>
        <!-- Diğerlerini buraya aynı yapıda ekleyebilirsin -->
    </div>

    <!-- Jam Collection 4'lü Set -->
    <h2 style="margin-top: 40px;">Jam Collection</h2>
    <div class="collection-grid">
        <div class="collection-card">
            <img src="set_gorseli.jpg" alt="Jam Set">
            <h3>4'lü Reçel Seti</h3>
            <p>1200₺</p>
            <button onclick="addToCart('Set')">Sepete Ekle</button>
        </div>
    </div>
</main>
    <script>
        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
        }
    </script>
</body>
</html
