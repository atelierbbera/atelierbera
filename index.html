<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atelier Bera</title>
    <style>
        body { font-family: 'Georgia', serif; margin: 0; background-color: #fdfaf6; color: #333; }
        
        /* Sepete Eklendi Bildirimi */
        #toast { visibility: hidden; background: #333; color: #fff; text-align: center; padding: 12px; position: fixed; z-index: 9999; left: 50%; bottom: 30px; transform: translateX(-50%); border-radius: 5px; font-size: 0.9rem; }
        #toast.show { visibility: visible; }

        .header-wrapper { display: flex; justify-content: space-between; padding: 20px; align-items: center; border-bottom: 1px solid #eee; }
        
        /* Ürün Kartları Düzenlemesi */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 15px; max-width: 800px; margin: auto; }
        .product-card { border: 1px solid #eee; padding: 10px; text-align: center; cursor: pointer; background: white; border-radius: 8px; }
        .product-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 4px; }
        .product-card h3 { font-size: 0.95rem; margin: 10px 0; }
        
        .new-price { color: #800020; font-weight: bold; font-size: 1rem; }
        .old-price { text-decoration: line-through; color: #888; font-size: 0.75rem; }
        .btn-add { background: #800020; color: white; border: none; padding: 8px; width: 100%; cursor: pointer; margin-top: 8px; border-radius: 4px; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="toast">Sepetinize eklendi!</div>
    
    <div class="header-wrapper">
        <div onclick="location.reload()" style="cursor:pointer; font-size: 20px;">☰</div>
        <div>Sepet (<span id="cart-count">0</span>)</div>
    </div>

    <div id="main-content">
        <div class="product-grid" id="grid"></div>
    </div>

<script>
    const products = [
        {id: 1, name: "Strawberry Jam", old: "800 TL", price: "650 TL", img: "Strawberry Jam.jfif"},
        {id: 2, name: "Blueberry Jam", old: "800 TL", price: "650 TL", img: "Blueberry Jam.jfif"},
        {id: 3, name: "Lemon Jam", old: "800 TL", price: "650 TL", img: "Lemon Jam.jfif"},
        {id: 4, name: "Mandarin Jam", old: "800 TL", price: "650 TL", img: "Mandarin Jam.jfif"},
        {id: 5, name: "Raspberry Jam", old: "800 TL", price: "650 TL", img: "Raspberry Jam.jfif"},
        {id: 6, name: "Jam Collection", old: "1200 TL", price: "1000 TL", img: "Jam Collection.jfif"}
    ];

    function showToast() {
        const x = document.getElementById("toast");
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 2000);
    }

    function addToCart(event) {
        // Kartın içine tıklayınca detay sayfasına gitmesini engelle
        event.stopPropagation(); 
        document.getElementById('cart-count').innerText = parseInt(document.getElementById('cart-count').innerText) + 1;
        showToast();
    }

    function renderProducts() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        products.forEach(p => {
            grid.innerHTML += `
            <div class="product-card" onclick="showDetail(${p.id})">
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <p class="old-price">${p.old}</p>
                <p class="new-price">${p.price}</p>
                <button class="btn-add" onclick="addToCart(event)">Sepete Ekle</button>
            </div>`;
        });
    }

    function showDetail(id) {
        const p = products.find(x => x.id === id);
        document.getElementById('main-content').innerHTML = `
            <div style="padding:20px; text-align:center; max-width:500px; margin:auto;">
                <img src="${p.img}" style="width:100%; border-radius:10px;">
                <h1>${p.name}</h1>
                <p class="old-price" style="font-size:1.2rem">${p.old}</p>
                <p class="new-price" style="font-size:1.5rem">${p.price}</p>
                <button class="btn-add" style="padding:15px; font-size:1rem" onclick="addToCart(event)">Sepete Ekle</button>
                <br><br>
                <a href="#" onclick="location.reload()">Geri Dön</a>
            </div>`;
    }

    renderProducts();
</script>
</body>
</html>
